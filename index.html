<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ثقه ودليل الباي</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
padding:40px;
}

button{
background:#6a1b9a;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#4a148c;
}
</style>

</head>

<body>

<h2>ثقه ودليل الباي</h2>
<p>ادعم التطبيق بعملية دفع Pi</p>

<button onclick="pay()">ادفع 0.01 Pi</button>

<script>

const Pi = window.Pi;

Pi.init({
version: "2.0",
sandbox: true
});

async function pay(){

const scopes = ['payments'];

const auth = await Pi.authenticate(scopes, function(payment){
console.log("Incomplete payment found", payment);
});

const paymentData = {
amount: 0.01,
memo: "دعم التطبيق",
metadata: {type:"donation"}
};

const paymentCallbacks = {

onReadyForServerApproval: function(paymentId){

fetch("/api/approve",{
method:"POST",
headers:{'Content-Type':'application/json'},
body: JSON.stringify({paymentId: paymentId})
});

},

onReadyForServerCompletion: function(paymentId, txid){

fetch("/api/complete",{
method:"POST",
headers:{'Content-Type':'application/json'},
body: JSON.stringify({
paymentId: paymentId,
txid: txid
})
});

},

onCancel: function(paymentId){
alert("تم إلغاء الدفع");
},

onError: function(error){
console.error(error);
}

};

Pi.createPayment(paymentData, paymentCallbacks);

}

</script>

</body>
</html>
