<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
        .pay-btn { background: #673ab7; color: white; padding: 20px; border: none; border-radius: 12px; font-size: 20px; cursor: pointer; width: 80%; max-width: 300px; }
        #status { margin-top: 20px; color: #555; font-size: 16px; }
    </style>
</head>
<body>

    <h2>ثقة ودليل الباي</h2>
    <button class="pay-btn" id="btn-pay">دفع 1 Test-Pi</button>
    <div id="status">اضغط للدفع التجريبي</div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        const status = document.getElementById('status');
        const workerURL = "https://pi.trust-app.workers.dev";

        document.getElementById('btn-pay').onclick = async () => {
            try {
                status.innerText = "جاري استدعاء المحفظة...";
                
                const payment = await Pi.createPayment({
                    amount: 1.0,
                    memo: "تجربة دفع - مشروع ثقة ودليل الباي",
                    metadata: { orderId: "TRUST_" + Date.now() }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        status.innerText = "جاري تأكيد العملية سرياً...";
                        // إرسال الإشارة للـ Worker
                        fetch(workerURL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ paymentId: paymentId })
                        });
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        status.innerText = "✅ اكتمل الدفع! شكراً لك.";
                        console.log("TXID:", txid);
                    },
                    onCancel: (paymentId) => { status.innerText = "تم إلغاء الدفع."; },
                    onError: (error, payment) => { status.innerText = "خطأ: " + error.message; }
                });
            } catch (err) {
                status.innerText = "فشل في تشغيل نظام الدفع.";
                console.error(err);
            }
        };
    </script>
</body>
</html>
