<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار دفع Pi - ثقة ودليل الباي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h2 { color: #673ab7; }
        #status { margin: 20px 0; color: #555; font-weight: bold; }
        .btn-pay { background-color: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-pay:active { transform: scale(0.98); background-color: #5e35b1; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ثقة ودليل الباي</h2>
        <p>تجربة نظام الدفع (Testnet)</p>
        
        <div id="status">جاري فحص الاتصال بالشبكة...</div>

        <button class="btn-pay" onclick="startPayment()">
            ادفع 1 Pi للتجربة
        </button>
    </div>

    <script>
        const Pi = window.Pi;
        // مفتاح الـ API الخاص بكِ (تأكدي أنه صحيح من Developer Portal)
        const MY_API_KEY = 'kt6zk72mbd5xyfqacqubmcltoynbvcs74uohmqe1b8vmz2g1wfspvbtgnoa8ycs2'; 

        // 1. تهيئة الـ SDK
        try {
            Pi.init({ version: "2.0", sandbox: false });
            document.getElementById('status').innerText = "✅ متصل بشبكة Pi";
            document.getElementById('status').style.color = "green";
        } catch (e) {
            document.getElementById('status').innerText = "❌ فشل الاتصال.. افتح الرابط من Pi Browser";
            document.getElementById('status').style.color = "red";
        }

        async function startPayment() {
            try {
                document.getElementById('status').innerText = "🔄 جاري طلب تسجيل الدخول...";

                // خطوة المصادقة (Authenticate)
                const auth = await Pi.authenticate(['payments', 'username'], onIncompletePaymentFound);
                console.log("تم تسجيل الدخول باسم: " + auth.user.username);
                document.getElementById('status').innerText = "مرحباً " + auth.user.username + ".. جاري فتح المحفظة";

                // خطوة إنشاء المعاملة (Create Payment)
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "تجربة دفع في مشروع ثقة ودليل الباي",
                    metadata: { orderId: "order_" + Date.now() }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        // هذه هي اللحظة التي تظهر فيها رسالة "انتظار موافقة السيرفر"
                        console.log("المعاملة رقم: " + paymentId);
                        alert("تم إرسال الطلب للموافقة!\nرقم المعاملة: " + paymentId + "\n(ستحتاجين للموافقة عليها يدوياً من لوحة المطورين حالياً)");
                        document.getElementById('status').innerText = "⏳ الطلب ينتظر موافقة السيرفر...";
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        // تنجح المعاملة هنا بعد موافقة السيرفر
                        alert("✅ تم الدفع بنجاح!\nرقم العملية: " + txid);
                        document.getElementById('status').innerText = "✅ اكتملت المعاملة بنجاح";
                    },
                    onCancel: function(paymentId) {
                        document.getElementById('status').innerText = "❌ تم إلغاء المعاملة من قِبلك";
                    },
                    onError: function(error, payment) {
                        alert("حدث خطأ: " + error.message);
                        document.getElementById('status').innerText = "❌ حدث خطأ في المعاملة";
                    }
                });

            } catch (err) {
                alert("يرجى التأكد من فتح الموقع من داخل متصفح Pi الرسمي.");
                console.error(err);
            }
        }

        // دالة التعامل مع المعاملات القديمة التي لم تكتمل
        function onIncompletePaymentFound(payment) {
            console.log("هناك معاملة قديمة معلقة رقم: " + payment.identifier);
            // يمكنك توجيه المستخدم لصفحة إنهاء المعاملة هنا
        }
    </script>
</body>
</html>
