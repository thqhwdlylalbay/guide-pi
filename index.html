<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - حل مشكلة خطوة 10</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // تهيئة الإصدار 2.0 كما في التعليمات
        Pi.init({ version: "2.0" });
    </script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding-top: 50px;">

    <div style="background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2 style="color: #673ab7;">ثقة ودليل الباي</h2>
        <p id="status" style="color: #555;">جاري التحقق من الاتصال...</p>
        
        <button id="pay-button" style="padding: 15px 30px; background-color: #673ab7; color: white; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px;">
            إرسال 1 Pi للتجربة
        </button>
        
        <p style="font-size: 12px; color: #888; margin-top: 15px;">تأكد من استخدام محفظة Testnet فقط</p>
    </div>

    <script>
        const scopes = ['payments', 'username'];

        // 2. دالة "تنظيف" العمليات المعلقة (حل مشكلة الرسالة اللي ظهرتلك)
        function onIncompletePaymentFound(payment) {
            console.log("وجدت معاملة معلقة، جاري إلغاؤها لفتح السكة...");
            // هذا الأمر يخبر السيرفر بإلغاء المعاملة القديمة فوراً
            Pi.cancelPayment(payment.identifier);
            document.getElementById('status').innerText = "تم تنظيف العمليات القديمة. جرب الآن!";
        };

        // 3. المصادقة التلقائية عند فتح الصفحة
        Pi.authenticate(scopes, onIncompletePaymentFound).then(function(auth) {
            console.log("تم تسجيل الدخول بنجاح باسم: " + auth.user.username);
            document.getElementById('status').innerText = "تم الاتصال: " + auth.user.username;
        }).catch(function(error) {
            console.error(error);
            document.getElementById('status').innerText = "فشل الاتصال بالشبكة.";
        });

        // 4. تنفيذ عملية الدفع عند الضغط على الزرار
        document.getElementById('pay-button').onclick = function() {
            document.getElementById('status').innerText = "جاري إنشاء المعاملة...";
            
            Pi.createPayment({
                amount: 1,
                memo: "اختبار خطوة 10 - مشروع ثقة",
                metadata: { orderId: "step-10-fix" },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("المعاملة جاهزة للموافقة. ID: " + paymentId);
                    document.getElementById('status').innerText = "بانتظار تأكيد المحفظة...";
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("تمت المعاملة بنجاح! TXID: " + txid);
                    // إكمال المعاملة رسمياً
                    Pi.completePayment(paymentId, txid);
                    document.getElementById('status').innerText = "مبروك! تمت العملية بنجاح.";
                    alert("تمت العملية! ارجع للوحة المطورين لتجد خطوة 10 خضراء.");
                },
                onCancel: function(paymentId) {
                    console.log("تم إلغاء العملية.");
                    document.getElementById('status').innerText = "تم إلغاء الدفع.";
                },
                onError: function(error, payment) {
                    console.error("خطأ:", error);
                    document.getElementById('status').innerText = "فشلت المعاملة، حاول مرة أخرى.";
                },
            });
        };
    </script>

</body>
</html>
