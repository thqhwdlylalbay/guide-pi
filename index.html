<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي | Trust & Pi Guide</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pi-p: #6d3082; --pi-g: #ffa500; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; text-align: right; }
        
        /* الهيدر مع أيقونة لغة محسنة */
        header { background: var(--pi-p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .lang-select { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px; border-radius: 10px; font-family: 'Cairo'; cursor: pointer; }

        .section { display: none; padding: 15px; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* كارت التاجر الموثق */
        .card { background: white; border-radius: 18px; padding: 18px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--pi-g); position: relative; }
        .verified-label { color: #2e7d32; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }
        .review-box { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 0.85rem; color: #555; border-right: 3px solid #ddd; }
        
        /* زر الإضافة والدفع */
        .btn-main { background: var(--pi-p); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 1rem; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; box-shadow: 0 -5px 20px rgba(0,0,0,0.08); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; cursor: pointer; font-size: 0.75rem; }
        .nav-item.active { color: var(--pi-p); border-top: 4px solid var(--pi-p); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 3px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Cairo'; }
    </style>
</head>
<body>

<header>
    <div>
        <i class="fas fa-globe"></i>
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
    </div>
    <div style="font-weight: bold;">ثقة ودليل الباي 🛡️</div>
</header>

<div id="home" class="section active">
    <h3 id="txt-title">قائمة التجار الموثوقين</h3>
    <div id="merchantsList"></div>
</div>

<div id="staking" class="section">
    <h3>حاسبة الاستيكنج الذكية</h3>
    <div class="card" style="border-top-color: var(--pi-p);">
        <label>كمية الـ Pi:</label>
        <input type="number" id="piAmount" oninput="runCalc()">
        <label>مدة القفل:</label>
        <select id="piTime" onchange="runCalc()">
            <option value="0.1">أسبوعين</option>
            <option value="0.25">6 شهور</option>
            <option value="1">سنة واحدة</option>
            <option value="2">3 سنوات</option>
        </select>
        <div id="calcRes" style="text-align:center; color:green; font-weight:bold; margin-top:15px;">المكافأة المتوقعة: 0%</div>
    </div>
</div>

<div id="add-merchant" class="section">
    <h3>إضافة تاجر جديد (توثيق وإعلان)</h3>
    <div class="card">
        <p style="font-size: 0.9rem; color: #666;">رسوم التوثيق والإضافة للدليل هي <b>1 Pi</b> فقط مدى الحياة.</p>
        <input type="text" id="mName" placeholder="اسم المحل / التاجر">
        <input type="text" id="mCat" placeholder="نوع النشاط (مثلاً: موبايلات)">
        <input type="text" id="mLoc" placeholder="المكان (مثلاً: القاهرة - مدينة نصر)">
        <textarea id="mDesc" placeholder="نبذة عن الخدمات..."></textarea>
        <button class="btn-main" onclick="payAndAdd()">
            <i class="fab fa-product-hunt"></i> دفع 1 Pi وتوثيق المحل
        </button>
    </div>
</div>

<div id="report" class="section">
    <h3 style="color:red">مركز البلاغات</h3>
    <div class="card">
        <input type="text" placeholder="اسم التاجر المشتكى عليه">
        <textarea placeholder="اشرح المشكلة بالتفصيل..."></textarea>
        <button class="btn-main" style="background:red">إرسال بلاغ</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="nav('home')"><i class="fas fa-store"></i>الرئيسية</div>
    <div class="nav-item" onclick="nav('staking')"><i class="fas fa-calculator"></i>الحاسبة</div>
    <div class="nav-item" onclick="nav('add-merchant')"><i class="fas fa-plus-circle"></i>أضف محلك</div>
    <div class="nav-item" onclick="nav('report')"><i class="fas fa-flag"></i>بلاغ</div>
</nav>

<script>
    const Pi = window.Pi;
    try { Pi.init({ version: "2.0", sandbox: true }); } catch(e){}

    function nav(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // تجار افتراضيين مع "تعليقات الناس"
    let merchants = JSON.parse(localStorage.getItem('trust_db')) || [
        {name: "أمانة ستور", cat: "إلكترونيات", loc: "الإسكندرية", review: "تعامل راقي جداً والبضاعة أصلية."},
        {name: "مطعم الخير", cat: "مأكولات", loc: "القاهرة", review: "الأكل طعمه ممتاز وبيقبلوا باي فوراً."}
    ];

    function render() {
        const container = document.getElementById('merchantsList');
        container.innerHTML = merchants.map(m => `
            <div class="card">
                <div class="verified-label"><i class="fas fa-check-circle"></i> تاجر موثوق منه</div>
                <h3 style="margin:5px 0">${m.name}</h3>
                <small><i class="fas fa-tag"></i> ${m.cat} | <i class="fas fa-map-marker-alt"></i> ${m.loc}</small>
                <div class="review-box">
                    <b>تجارب الناس:</b><br>
                    "${m.review || 'لا توجد تعليقات بعد'}"
                </div>
            </div>
        `).join('');
    }

    // وظيفة الدفع للإضافة (التاجر هو اللي بيدفع)
    async function payAndAdd() {
        const name = document.getElementById('mName').value;
        if(!name) return alert("من فضلك ادخل اسم المحل");

        try {
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "رسوم توثيق وإعلان محل: " + name,
                metadata: { type: "merchant_ad" }
            }, {
                onReadyForServerApproval: (id) => console.log(id),
                onReadyForServerCompletion: (id, tx) => {
                    saveMerchant();
                    alert("🎉 تم الدفع وتوثيق المحل بنجاح!");
                },
                onCancel: (id) => {},
                onError: (err) => alert("خطأ في الدفع: " + err.message)
            });
        } catch(e) {
            alert("يرجى استخدام Pi Browser الرسمي لتتمكن من الدفع وتوثيق المحل.");
        }
    }

    function saveMerchant() {
        const m = {
            name: document.getElementById('mName').value,
            cat: document.getElementById('mCat').value,
            loc: document.getElementById('mLoc').value,
            review: "تم التوثيق حديثاً - في انتظار تجاربكم"
        };
        merchants.push(m);
        localStorage.setItem('trust_db', JSON.stringify(merchants));
        render();
        nav('home');
    }

    function runCalc() {
        const a = document.getElementById('piAmount').value || 0;
        const t = document.getElementById('piTime').value;
        document.getElementById('calcRes').innerText = `المكافأة المتوقعة: ${(a * t * 40).toFixed(2)}%`;
    }

    function changeLang(l) {
        document.body.dir = l === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('txt-title').innerText = l === 'ar' ? 'قائمة التجار الموثوقين' : 'Verified Merchants List';
    }

    render();
</script>
</body>
            </html>
