<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8f4ff; margin: 0; padding: 15px; text-align: center; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; text-align: right; }
        .card { background: linear-gradient(135deg, #6a11cb, #2575fc); border-radius: 20px; padding: 25px; color: white; margin-bottom: 20px; }
        .btn-pay { background: #ffc107; color: #222; border: none; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: white; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
        #status { margin-top: 15px; font-weight: bold; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div style="background:#673ab7; color:white; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center;">π</div>
        <div><b>ثقة ودليل الباي</b><br><small style="color:#777;">استثمر عملاتك بأمان</small></div>
    </div>

    <div class="card">
        <h2>بوابة دفع Pi الرسمية</h2>
        <button class="btn-pay" onclick="pay()">ادفع Pi 1 (تجريبي) 💰</button>
        <div id="status"></div>
    </div>

    <div class="grid">
        <div class="box">🏪<br><b>أضف متجرك</b></div>
        <div class="box">📈<br><b>احسب أرباحك</b></div>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function pay() {
            const s = document.getElementById('status');
            s.innerHTML = "جاري الاتصال بالمحفظة... ⏳";
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "دفع تجريبي - ثقة ودليل الباي",
                    metadata: { orderId: "TRUST_" + Date.now() },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        return fetch('https://pi.trust-app.workers.dev/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        }).then(res => res.json());
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        return fetch('https://pi.trust-app.workers.dev/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        }).then(res => res.json());
                    },
                    onCancel: () => { s.innerHTML = "❌ تم إلغاء الدفع"; },
                    onError: (error) => { s.innerHTML = "❌ خطأ: " + error.message; }
                });
                s.innerHTML = "✅ نجح الدفع!";
            } catch (e) {
                s.innerHTML = "❌ يجب فتح التطبيق من Pi Browser";
            }
        }
    </script>
</body>
</html>
