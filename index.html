<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; font-family: Arial, sans-serif; padding-top: 50px;">

    <h1>مرحباً بك في مشروع ثقة ودليل الباي</h1>
    <p>هذا الموقع مخصص لتجارب الدفع الآمنة</p>

    <button id="pay-button" style="background-color: #6c5ce7; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 20px; cursor: pointer;">
        دفع 1 Pi للتجربة
    </button>

    <script>
        // تشغيل مكتبة Pi (وضعية التجربة Sandbox)
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('pay-button').onclick = function() {
            Pi.createPayment({
                amount: 1,
                memo: "تجربة دفع - ثقة ودليل الباي",
                metadata: { orderId: 101 }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("المعاملة بانتظار الموافقة:", paymentId);
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("تم الدفع بنجاح! رقم العملية:", txid);
                    alert("تمت العملية بنجاح!");
                },
                onCancel: function(paymentId) { console.log("تم الإلغاء"); },
                onError: function(error, paymentId) { console.error("خطأ:", error); }
            });
        };
    </script>
</body>
</html>
