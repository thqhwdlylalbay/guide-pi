<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - الإصدار النهائي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; background-color: #f8f9fa; padding: 20px;">

    <div style="background: white; max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="color: #673ab7;">ثقة ودليل الباي</h2>
        <p id="status" style="color: #d32f2f; font-weight: bold;">جاري فحص المعاملات المعلقة...</p>
        
        <button id="pay-button" style="padding: 15px 30px; background-color: #673ab7; color: white; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; width: 100%; display: none;">
            إتمام الخطوة 10 الآن
        </button>
    </div>

    <script>
        // 1. التعامل مع المعاملات المعلقة (الحل الجذري)
        const onIncompletePaymentFound = (payment) => {
            console.log("وجدت معاملة غير مكتملة:", payment);
            
            // إذا كانت المعاملة وصلت للبلوكشين ولها txid
            if (payment.transaction && payment.transaction.txid) {
                console.log("جاري إكمال المعاملة المعلقة برقم:", payment.transaction.txid);
                
                // إرسال إشارة الإتمام فوراً للسيرفر لإغلاقها
                Pi.completePayment(payment.identifier, payment.transaction.txid);
                
                document.getElementById('status').innerText = "تم إغلاق المعاملة المعلقة. يمكنك الآن الضغط على الزرار.";
                document.getElementById('pay-button').style.display = "block";
            } else {
                // إذا لم تكن قد وصلت للبلوكشين، يجب إلغاؤها لبدء واحدة جديدة
                // ملاحظة: التعليمات تشير إلى أن الإلغاء يتم عبر الـ API، سنحاول هنا برمجياً
                document.getElementById('status').innerText = "يوجد معاملة لم تكتمل، يرجى إعادة تحميل الصفحة.";
            }
        };

        // 2. تسجيل الدخول
        Pi.authenticate(['payments', 'username'], onIncompletePaymentFound).then(function(auth) {
            document.getElementById('status').style.color = "green";
            document.getElementById('status').innerText = "متصل: " + auth.user.username;
            document.getElementById('pay-button').style.display = "block";
        }).catch(function(err) {
            document.getElementById('status').innerText = "خطأ في الاتصال: " + err.message;
        });

        // 3. زر إنشاء الدفع
        document.getElementById('pay-button').onclick = function() {
            Pi.createPayment({
                amount: 1,
                memo: "إتمام المرحلة 10 - ثقة ودليل الباي",
                metadata: { orderId: "TRUST_FINAL_10" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    document.getElementById('status').innerText = "جاري معالجة الطلب...";
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    // أهم خطوة: إخبار Pi أن العملية تمت بنجاح
                    Pi.completePayment(paymentId, txid);
                    document.getElementById('status').innerText = "مبروك! تمت العملية بنجاح.";
                    alert("تمت العملية! تفقد الخطوة 10 في لوحة المطورين.");
                },
                onCancel: function(paymentId) {
                    document.getElementById('status').innerText = "تم إلغاء المعاملة.";
                },
                onError: function(error, payment) {
                    document.getElementById('status').innerText = "خطأ: " + error.message;
                }
            });
        };
    </script>
</body>
</html>
