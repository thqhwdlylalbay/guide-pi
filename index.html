<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Trust and Pi Guide</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; padding-top: 50px;">

    <h1>ثقة ودليل الباي</h1>
    <button id="btn" style="padding: 15px 30px; background: #6c5ce7; color: white; border: none; border-radius: 8px; font-size: 18px;">
        توثيق الحساب (1 Pi)
    </button>
    <p id="msg"></p>

    <script>
        // 1. التهيئة الفورية (أهم سطر عشان الخطأ اللي ظهرلك)
        Pi.init({ version: "1.5", sandbox: false });

        // 2. المصادقة التلقائية
        async function login() {
            try {
                await Pi.authenticate(['payments', 'username'], onIncomplete);
            } catch (e) {
                document.getElementById('msg').innerText = "افتح التطبيق من Pi Browser";
            }
        }

        async function onIncomplete(p) {
            await fetch("https://trust-pi-guide.netlify.app/api/complete", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: p.identifier, txid: p.transaction.txid })
            });
        }

        // 3. زرار الدفع
        document.getElementById('btn').onclick = async () => {
            try {
                const pay = await Pi.createPayment({
                    amount: 1,
                    memo: "Verification",
                    metadata: { type: "verification" }
                }, {
                    onReadyForServerApproval: (id) => {
                        fetch("https://trust-pi-guide.netlify.app/api/approve", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id })
                        });
                    },
                    onReadyForServerCompletion: (id, tx) => {
                        fetch("https://trust-pi-guide.netlify.app/api/complete", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, txid: tx })
                        });
                        document.getElementById('msg').innerText = "تم التوثيق!";
                    },
                    onCancel: () => {},
                    onError: () => { document.getElementById('msg').innerText = "خطأ في العملية"; }
                });
            } catch (err) {}
        };

        login();
    </script>
</body>
</html>
