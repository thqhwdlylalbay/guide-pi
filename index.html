<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - نظام المدفوعات v2</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // تهيئة الإصدار الثاني (v2) بناءً على تعليمات الملخص
        Pi.init({ version: "2.0" });
    </script>
</head>
<body>

    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <img src="https://minepi.com/wp-content/uploads/2021/03/logo.png" width="100" alt="Pi Logo">
        <h2>منصة تطبيقات Pi - مشروع ثقة ودليل الباي</h2>
        <p>اختبار واجهة برمجة تطبيقات النظام الأساسي (U2A Payment)</p>
        
        <button id="pay-button" style="padding: 15px 30px; background-color: #673ab7; color: white; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
            إرسال 1 Pi للتجربة
        </button>
        <div id="status" style="margin-top: 20px; color: #555;"></div>
    </div>

    <script>
        // 1. تحديد النطاق (Scopes) المطلوب للوصول لموارد المستخدم
        const scopes = ['payments', 'username'];

        // 2. دالة التعامل مع المدفوعات غير المكتملة (بناءً على مرجع PaymentDTO)
        function onIncompletePaymentFound(payment) {
            console.log("Incomplete payment found:", payment.identifier);
            // إبلاغ المنصة بأننا نعالج المعاملة المعلقة لتجنب خطأ الـ Pending
            // في حالة عدم وجود خادم (Backend)، نقوم بإكمالها محلياً إذا توفر txid
            if (payment.transaction && payment.transaction.txid) {
                Pi.completePayment(payment.identifier, payment.transaction.txid);
            }
        };

        // 3. إجراء المصادقة (Authentication) للحصول على رمز الوصول (Access Token)
        Pi.authenticate(scopes, onIncompletePaymentFound).then(function(auth) {
            document.getElementById('status').innerText = "تم الاتصال: " + auth.user.username;
            console.log("User Authenticated. Access Token obtained.");
        }).catch(function(error) {
            console.error("Auth Error:", error);
            document.getElementById('status').innerText = "خطأ في الاتصال بالمنصة.";
        });

        // 4. إنشاء عملية الدفع (U2A) عند الضغط على الزرار
        document.getElementById('pay-button').onclick = function() {
            Pi.createPayment({
                amount: 1, // المبلغ المحدد في مثال التعليمات
                memo: "اختبار دفع من مستخدم إلى تطبيق - ثقة ودليل الباي",
                metadata: { orderId: "step-10-verification" },
            }, {
                // استدعاءات الـ Callbacks المطلوبة في المرجع
                onReadyForServerApproval: function(paymentId) {
                    console.log("Payment created. ID:", paymentId);
                    // تنبيه: في التطبيقات الحقيقية، هنا ترسل paymentId لخادمك لعمل /approve
                    // للخطوة 10، المنصة تراقب مجرد استدعاء هذه الدالة بنجاح
                    document.getElementById('status').innerText = "بانتظار موافقة الشبكة...";
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("Transaction verified on Blockchain. TXID:", txid);
                    // إتمام العملية برمجياً لإغلاق الدفع
                    Pi.completePayment(paymentId, txid);
                    document.getElementById('status').innerText = "تمت المعاملة بنجاح!";
                    alert("تم دفع 1 Pi بنجاح لخطوة 10");
                },
                onCancel: function(paymentId) {
                    console.log("Payment cancelled by user.");
                    document.getElementById('status').innerText = "تم إلغاء المعاملة.";
                },
                onError: function(error, payment) {
                    console.error("Payment Error:", error);
                    document.getElementById('status').innerText = "فشلت المعاملة.";
                },
            });
        };
    </script>

</body>
</html>
