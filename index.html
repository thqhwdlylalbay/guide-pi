<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل ثقة ودليل الباي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js?v=1.2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f3e5f5; padding: 50px 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-pay { background: #000; color: #fff; padding: 20px; border-radius: 15px; border: 2px dashed #ffd700; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-pay:active { background: #333; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h2>تفعيل الخطوة 10</h2>
        <p>باقي تكة واحدة! اضغطي الزر واختاري محفظتك.</p>
        <button class="btn-pay" onclick="transferPi()">تفعيل بـ 0.1 Pi (تجريبي)</button>
    </div>

    <script>
        const Pi = window.Pi;
        // تفعيل وضع الـ Sandbox لربط المحفظة التجريبية
        Pi.init({ version: "2.0", sandbox: true });

        async function transferPi() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "تفعيل مشروع ثقة ودليل الباي - الخطوة 10",
                    metadata: { step: 10 }
                }, {
                    onReadyForServerApproval: (paymentId) => { 
                        console.log("Approved:", paymentId); 
                    },
                    onReadyForServerCompletion: (paymentId, txid) => { 
                        alert("تم التفعيل بنجاح! مبروك يا شريكتي."); 
                    },
                    onCancel: (paymentId) => { 
                        console.log("Canceled"); 
                    },
                    onError: (error, payment) => { 
                        alert("تأكدي من فتح المحفظة wallet.pi واختيار شبكة Testnet");
                    }
                });
            } catch (e) {
                // رسالة توضيحية في حالة وجود مشكلة في الربط
                alert("يرجى التأكد من الدخول عبر زر Start في الخطوة 10");
            }
        }
    </script>
</body>
</html>
