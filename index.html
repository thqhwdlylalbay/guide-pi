<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #673ab7; --bg: #f4f0fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; direction: rtl; padding-bottom: 80px; }
        .header { background: #fff; padding: 15px; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .action-card { background: #fff; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-pay { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        .status-bar { background: #333; color: #fff; padding: 8px; text-align: center; font-size: 12px; position: fixed; top: 55px; width: 100%; display: none; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="status" class="status-bar">جاري معالجة الطلب...</div>

    <header class="header">
        <b style="color: var(--primary); font-size: 20px;">ثقة ودليل الباي</b>
    </header>

    <div class="container">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div class="action-card" style="border: 2px solid var(--primary); color: var(--primary); cursor: pointer;" onclick="alert('سيتم تفعيل الحاسبة قريباً')">
                <i class="fas fa-chart-line"></i><br><b>احسب أرباحك</b>
            </div>
            <div class="action-card" style="background: var(--primary); color: white; cursor: pointer;" onclick="window.open('https://docs.google.com/forms/d/your-id', '_blank')">
                <i class="fas fa-store"></i><br><b>أضف متجرك</b>
            </div>
        </div>

        <div class="action-card" style="border-right: 5px solid #ff9800;">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
                <b>Pi Pizza Hub</b>
                <span style="color:#ffc107;">4.6 <i class="fas fa-star"></i></span>
            </div>
            <p style="font-size:13px; color:#666; text-align: right;">دعم نظام المقايضة وتأكيد الخطوة 10.</p>
            <button id="pay-button" class="btn-pay">اطلب الآن (1 Pi)</button>
        </div>
    </div>

    <nav class="nav-bottom">
        <span style="color: var(--primary);">الرئيسية</span>
        <span>أرباح</span>
        <span>توثيق</span>
    </nav>

    <script>
        const statusDiv = document.getElementById('status');
        const payBtn = document.getElementById('pay-button');

        function updateStatus(msg, show = true) {
            statusDiv.innerText = msg;
            statusDiv.style.display = show ? 'block' : 'none';
        }

        async function handleServerCompletion(paymentId, txid) {
            updateStatus("جاري التأكيد النهائي بالسيرفر...");
            try {
                const response = await fetch('/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId, txid })
                });
                if (response.ok) {
                    updateStatus("✅ تمت العملية بنجاح!");
                    alert("تم تأكيد المعاملة بنجاح الصاروخ!");
                }
            } catch (e) { updateStatus("❌ خطأ في السيرفر"); }
        }

        // تسجيل الدخول بدون عرض أي أسماء شخصية
        Pi.authenticate(['payments']).then(() => {
            console.log("App Ready");
        }).catch(() => { updateStatus("يرجى الفتح من Pi Browser"); });

        payBtn.onclick = () => {
            payBtn.disabled = true;
            updateStatus("جاري فتح المحفظة...");
            Pi.createPayment({
                amount: 1,
                memo: "تأكيد معاملة ثقة ودليل الباي",
                metadata: { orderId: "ID_" + Date.now() }
            }, {
                onReadyForServerApproval: () => updateStatus("في انتظار الموافقة..."),
                onReadyForServerCompletion: (id, txid) => handleServerCompletion(id, txid),
                onCancel: () => { updateStatus("", false); payBtn.disabled = false; },
                onError: (err) => { updateStatus("خطأ: " + err.message); payBtn.disabled = false; }
            });
        };
    </script>
</body>
    </html>
