<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8f4ff; margin: 0; padding: 15px; text-align: center; }
        .card { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); border-radius: 20px; padding: 25px; color: white; margin-bottom: 20px; }
        .btn-pay { background: #ffc107; color: #333; border: none; padding: 15px 35px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; width: 90%; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>بوابة دفع Pi الرسمية</h2>
        <button class="btn-pay" onclick="pay()">ادفع Pi 1 (تجريبي) 💰</button>
        <div id="status"></div>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function pay() {
            const s = document.getElementById('status');
            s.innerHTML = "جاري فتح المحفظة... ⏳";
            try {
                await Pi.createPayment({
                    amount: 1,
                    memo: "تجربة دفع - ثقة ودليل الباي",
                    metadata: { orderId: "ID_" + Date.now() },
                }, {
                    // هنا بنادي السيرفر بتاعك المباشر
                    onReadyForServerApproval: (id) => fetch('https://pi.trust-app.workers.dev', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({action:'approve', paymentId:id}) 
                    }).then(r => r.json()),
                    
                    onReadyForServerCompletion: (id, tx) => fetch('https://pi.trust-app.workers.dev', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({action:'complete', paymentId:id, txid:tx}) 
                    }).then(r => r.json()),
                    
                    onCancel: () => { s.innerHTML = "❌ تم الإلغاء"; },
                    onError: (e) => { s.innerHTML = "❌ خطأ في السيرفر"; }
                });
                s.innerHTML = "✅ نجح الدفع!";
            } catch (e) { 
                s.innerHTML = "❌ افتحي التطبيق من Pi Browser"; 
            }
        }
    </script>
</body>
</html>
