<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - نظام الدفع</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        .btn-pay { background: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; }
        #status { margin-top: 20px; font-weight: bold; color: #555; min-height: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ثقة ودليل الباي</h2>
        <div id="status">جاهز لتوثيق الخطوة العاشرة</div>
        <br>
        <button class="btn-pay" onclick="startPayment()">اضغط هنا لإتمام المعاملة</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        // ملاحظة هامة: استبدلي الرابط بالأسفل برابط الـ Worker الجديد من حسابك الحالي
        const WORKER_URL = "https://morning-wildflower-d9b9.trust-app.workers.dev/"; 

        async function startPayment() {
            try {
                const auth = await Pi.authenticate(['payments', 'username'], onIncompletePaymentFound);
                document.getElementById('status').innerText = "مرحباً " + auth.user.username;

                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Verification Payment for Step 10",
                    metadata: { orderId: "verify_" + Date.now() }
                }, {
                    onReadyForServerApproval: async function(paymentId) {
                        document.getElementById('status').innerText = "⏳ جاري التوثيق...";
                        await fetch(`${WORKER_URL}?paymentId=${paymentId}`);
                        document.getElementById('status').innerText = "✅ تمت الموافقة من السيرفر!";
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        document.getElementById('status').innerText = "✅ اكتملت المعاملة بنجاح!";
                        alert("مبروك! تم الدفع والتوثيق.");
                    },
                    onCancel: function(paymentId) { document.getElementById('status').innerText = "❌ تم إلغاء المعاملة"; },
                    onError: function(error) { document.getElementById('status').innerText = "❌ خطأ: " + error.message; }
                });
            } catch (err) {
                alert("يرجى فتح الموقع من داخل Pi Browser");
            }
        }

        async function onIncompletePaymentFound(payment) {
            const paymentId = payment.identifier;
            document.getElementById('status').innerText = "⏳ جاري إنهاء معاملة سابقة...";
            await fetch(`${WORKER_URL}?paymentId=${paymentId}`);
            // بعد المحاولة، يفضل عمل ريفريش يدوي لو لم تختفِ الرسالة
        }
    </script>
</body>
</html>
