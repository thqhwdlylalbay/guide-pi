<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Trust and Pi Guide</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>ثقة ودليل الباي</h1>
    <button id="pay_button" style="padding: 15px; background: #6c5ce7; color: white; border: none; border-radius: 5px; cursor: pointer;">
        دفع 1 Pi للتوثيق
    </button>
    <p id="status"></p>

    <script>
        const Pi = window.Pi;
        // تهيئة الـ SDK هي أهم خطوة عند الكورتيم
        Pi.init({ version: "1.5", sandbox: false });

        async function auth() {
            try {
                await Pi.authenticate(['payments', 'username'], onIncompletePaymentFound);
            } catch (err) {
                document.getElementById('status').innerText = "خطأ في المصادقة";
            }
        }

        async function onIncompletePaymentFound(payment) {
            await fetch("https://trust-pi-guide.netlify.app/api/complete", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
            });
        }

        document.getElementById('pay_button').onclick = async () => {
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "توثيق الحساب",
                    metadata: { type: "verification" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        fetch("https://trust-pi-guide.netlify.app/api/approve", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        fetch("https://trust-pi-guide.netlify.app/api/complete", {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        });
                        document.getElementById('status').innerText = "تم بنجاح!";
                    },
                    onCancel: (pId) => {},
                    onError: (err, p) => { document.getElementById('status').innerText = "حدث خطأ"; }
                });
            } catch (err) {
                console.error(err);
            }
        };

        auth(); // تشغيل المصادقة فوراً عند التحميل
    </script>
</body>
</html>
