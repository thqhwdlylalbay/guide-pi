<script>
    async function loadMerchants() {
        try {
            const response = await fetch('/get_merchants');
            const merchants = await response.json();
            const list = document.getElementById('merchantList');
            list.innerHTML = ''; 
            merchants.forEach(m => {
                list.innerHTML += `<div class="card">...</div>`; // عرض الكروت أوتوماتيكياً
            });
        } catch (err) { console.error("خطأ في جلب البيانات"); }
    }
    window.onload = loadMerchants;
</script>
