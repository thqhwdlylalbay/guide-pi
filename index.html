<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - Trust & Pi Guide</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f0fa;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .logo-section { display: flex; align-items: center; }
        .logo-circle {
            background: #673ab7;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-left: 10px;
        }
        .card {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .btn-pay {
            background-color: #ffc107;
            color: #333;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-pay:hover { transform: scale(1.05); }
        .status-text { margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <div class="logo-circle">π</div>
            <div style="text-align: right;">
                <div style="font-weight: bold; font-size: 18px;">ثقة ودليل الباي</div>
                <div style="font-size: 12px; color: #666;">استثمر عملاتك بأمان</div>
            </div>
        </div>
        <div style="color: #673ab7;">🌐</div>
    </div>

    <div class="card">
        <div style="font-size: 40px; margin-bottom: 10px;">💳</div>
        <h2 style="margin: 10px 0;">بوابة دفع Pi الرسمية</h2>
        <p style="font-size: 14px; opacity: 0.9;">اختبر اتصال السيرفر الآمن للخطوة 10</p>
        
        <button class="btn-pay" onclick="startPayment()">
            ادفع Pi 1 (تجريبي) 💰
        </button>

        <div id="status" class="status-text"></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div style="background: white; padding: 20px; border-radius: 15px; border: 1px solid #ddd;">
            <div style="font-size: 24px;">🏪</div>
            <div style="font-weight: bold; margin-top: 5px;">أضف متجرك</div>
        </div>
        <div style="background: white; padding: 20px; border-radius: 15px; border: 1px solid #ddd;">
            <div style="font-size: 24px;">📈</div>
            <div style="font-weight: bold; margin-top: 5px;">احسب أرباحك</div>
        </div>
    </div>

    <script>
        // تهيئة SDK الباي
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function startPayment() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = "جاري الاتصال بالمحفظة... ⏳";
            statusDiv.style.color = "white";

            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "دفع تجريبي - مشروع ثقة ودليل الباي",
                    metadata: { orderId: "TRUST-GUIDE-" + Date.now() },
                }, {
                    // الخطوة 1: السيرفر يوافق على الدفع
                    onReadyForServerApproval: function(paymentId) {
                        return fetch('https://pi.trust-app.workers.dev', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'approve', paymentId: paymentId })
                        }).then(res => res.json());
                    },
                    // الخطوة 2: السيرفر يؤكد إتمام العملية
                    onReadyForServerCompletion: function(paymentId, txid) {
                        return fetch('https://pi.trust-app.workers.dev', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'complete', paymentId: paymentId, txid: txid })
                        }).then(res => res.json());
                    },
                    onCancel: function(paymentId) {
                        statusDiv.innerHTML = "❌ تم إلغاء العملية.";
                    },
                    onError: function(error, payment) {
                        statusDiv.innerHTML = "❌ خطأ: " + error.message;
                    }
                });

                statusDiv.innerHTML = "✅ تم الدفع بنجاح! السيرفر جاهز للمايننت.";
                statusDiv.style.color = "#4CAF50";
                alert("تمت المعاملة بنجاح في محفظة التستنت!");

            } catch (err) {
                statusDiv.innerHTML = "❌ فشل: يجب استخدام Pi Browser.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
