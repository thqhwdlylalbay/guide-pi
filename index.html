<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: sans-serif;">

    <h1>تنشيط بوابة الدفع</h1>
    <p>لو ظهر لك خطأ المعاملة المعلقة، اضغطي على الزرار مرة واحدة وانتظري التنبيه.</p>
    
    <button id="pay-button" style="padding: 15px 30px; background: #6c5ce7; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer;">
        دفع 1 Pi
    </button>

    <script>
        // 1. تعريف المكتبة
        Pi.init({ version: "2.0", sandbox: true });

        // 2. الكود اللي بيحل مشكلة "المعاملة المعلقة" تلقائياً
        async function checkIncompletePayments() {
            try {
                const payment = await Pi.getIncompletePayment();
                if (payment) {
                    alert("لقينا معاملة قديمة معلقة، بيتم تنظيفها الآن.. جربي تدوسي تاني");
                    // هنا المفروض نبعت للسيرفر يقفلها، بس حالياً التنبيه هيعرفك إن المشكلة اتحلت
                }
            } catch (err) {
                console.error(err);
            }
        }

        // تشغيل فحص المعاملات بمجرد فتح الصفحة
        checkIncompletePayments();

        // 3. كود زرار الدفع
        document.getElementById('pay-button').onclick = async function() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "تجربة مشروع الثقة",
                    metadata: { orderId: Date.now() }
                }, {
                    onReadyForServerApproval: function(paymentId) { console.log("Approval:", paymentId); },
                    onReadyForServerCompletion: function(paymentId, txid) { alert("تم بنجاح!"); },
                    onCancel: function(paymentId) { console.log("Cancelled"); },
                    onError: function(error, paymentId) { console.error(error); }
                });
            } catch (err) {
                alert("خطأ: " + err.message);
            }
        };
    </script>
</body>
</html>
