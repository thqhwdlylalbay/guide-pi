<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - نظام الدفع التلقائي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f4f9; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h2 { color: #673ab7; margin-bottom: 5px; }
        #status { margin: 20px 0; font-weight: bold; padding: 10px; border-radius: 5px; background: #eee; }
        .btn-pay { background: linear-gradient(45deg, #673ab7, #9c27b0); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(103, 58, 183, 0.3); }
        .btn-pay:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <h2>ثقة ودليل الباي</h2>
        <p style="font-size: 0.9em; color: #666;">تجربة الدفع مع الموافقة التلقائية</p>
        
        <div id="status">جاري فحص الاتصال بالشبكة...</div>

        <button class="btn-pay" onclick="startPayment()">
            <i class="fab fa-pi"></i> ادفع 1 Pi للتجربة
        </button>
    </div>

    <script>
        const Pi = window.Pi;
        
        // 1. تشغيل المكتبة
        try {
            Pi.init({ version: "2.0", sandbox: false });
            document.getElementById('status').innerText = "✅ متصل بشبكة Pi";
        } catch (e) {
            document.getElementById('status').innerText = "❌ افتح الرابط من داخل Pi Browser";
        }

        async function startPayment() {
            try {
                document.getElementById('status').innerText = "🔄 جاري تسجيل الدخول...";

                // طلب المصادقة
                const auth = await Pi.authenticate(['payments', 'username'], onIncompletePaymentFound);
                document.getElementById('status').innerText = "مرحباً " + auth.user.username + ".. اطلب الدفع الآن";

                // إنشاء المعاملة
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "تجربة دفع تلقائية - مشروع ثقة ودليل الباي",
                    metadata: { orderId: "order_" + Date.now() }
                }, {
                    onReadyForServerApproval: async function(paymentId) {
                        document.getElementById('status').innerText = "⏳ جاري إرسال الموافقة من السيرفر...";
                        
                        // الربط مع الـ Backend (ملف api/approve.js)
                        try {
                            const response = await fetch(/api/approve?paymentId=${paymentId});
                            const result = await response.json();
                            
                            if (response.ok) {
                                console.log("تمت موافقة السيرفر:", result.message);
                            } else {
                                alert("خطأ من السيرفر: " + result.message);
                            }
                        } catch (err) {
                            console.error("فشل الاتصال بالـ Backend:", err);
                        }
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        alert("✅ اكتملت المعاملة بنجاح!\nرقم العملية: " + txid);
                        document.getElementById('status').innerText = "✅ تم الدفع والتوثيق بنجاح!";
                    },
                    onCancel: function(paymentId) {
                        document.getElementById('status').innerText = "❌ تم إلغاء المعاملة";
                    },
                    onError: function(error, payment) {
                        alert("حدث خطأ: " + error.message);
                        document.getElementById('status').innerText = "❌ خطأ في العملية";
                    }
                });

} catch (err) {
                alert("تأكد من فتح الموقع داخل تطبيق Pi الرسمي.");
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("هناك معاملة معلقة: " + payment.identifier);
        }
    </script>
</body>
</html>
