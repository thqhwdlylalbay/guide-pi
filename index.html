<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - التحقق النهائي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // تهيئة التطبيق في بيئة الاختبار (Sandbox)
        Pi.init({ version: "2.0", sandbox: true });
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .card { background: white; max-width: 450px; margin: 50px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #673ab7; }
        #status { margin: 20px 0; padding: 10px; border-radius: 8px; background: #eee; color: #333; font-weight: bold; }
        .btn { padding: 15px 25px; background-color: #673ab7; color: white; border: none; border-radius: 50px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background-color: #5e35b1; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="card">
        <h2>ثقة ودليل الباي</h2>
        <div id="status">جاري فحص حالة الاتصال...</div>
        
        <button id="pay-button" class="btn" style="display: none;">
            إتمام الخطوة 10 الآن
        </button>
        
        <p style="font-size: 12px; color: #888; margin-top: 15px;">* هذا التطبيق يعمل في بيئة الاختبار (Sandbox).</p>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const payButton = document.getElementById('pay-button');

        // وظيفة إرسال البيانات لسيرفر Cloudflare (الـ Function التي أنشأناها في خطوة 1)
        async function notifyServerToComplete(paymentId, txid) {
            try {
                const response = await fetch('/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId, txid })
                });
                return await response.json();
            } catch (err) {
                console.error("خطأ في الاتصال بالسيرفر:", err);
            }
        }

        // 1. التعامل مع المعاملات المعلقة (حل مشكلة Pending Payment)
        const onIncompletePaymentFound = (payment) => {
            statusDiv.innerText = "اكتشاف معاملة معلقة.. جاري معالجتها تلقائياً.";
            statusDiv.style.color = "orange";

            // إذا كانت المعاملة تحتوي على رقم العملية (txid)، نرسلها فوراً للسيرفر ليغلقها
            if (payment.transaction && payment.transaction.txid) {
                notifyServerToComplete(payment.identifier, payment.transaction.txid).then(res => {
                    statusDiv.innerText = "تم إغلاق المعاملة القديمة بنجاح! يمكنك البدء الآن.";
                    statusDiv.style.color = "green";
                });
            }
        };

        // 2. تسجيل الدخول والمصادقة
        Pi.authenticate(['payments', 'username'], onIncompletePaymentFound).then(function(auth) {
            statusDiv.innerText = "متصل باسم: " + auth.user.username;
            statusDiv.style.color = "black";
            payButton.style.display = "block";
        }).catch(function(err) {
            statusDiv.innerText = "خطأ في المصادقة: " + err.message;
            statusDiv.style.color = "red";
        });

        // 3. عند الضغط على زر الدفع
        payButton.onclick = function() {
            payButton.disabled = true;
            statusDiv.innerText = "جاري إنشاء طلب الدفع...";

            Pi.createPayment({
                amount: 1,
                memo: "اختبار الخطوة 10 - ثقة ودليل الباي",
                metadata: { orderId: "TRUST_" + Date.now() }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    statusDiv.innerText = "في انتظار موافقة المحفظة...";
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    statusDiv.innerText = "جاري تأكيد المعاملة على السيرفر...";
                    // إرسال البيانات للـ Cloudflare Function لإتمام الخطوة 10 رسمياً
                    notifyServerToComplete(paymentId, txid).then(res => {
                        statusDiv.innerText = "مبروك! تمت العملية وتأكدت الخطوة 10.";
                        statusDiv.style.color = "green";
                        alert("تمت العملية بنجاح! راجعي Developer Portal الآن.");
                    });
                },
                onCancel: function(paymentId) {
                    statusDiv.innerText = "تم إلغاء العملية.";
                    payButton.disabled = false;
                },
                onError: function(error, payment) {
                    statusDiv.innerText = "خطأ: " + error.message;
                    payButton.disabled = false;
                }
            });
        };
    </script>
</body>
</html>
