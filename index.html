<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --main-color: #6d3082; --bg-color: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 50px; }
        header { background: var(--main-color); color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .merchant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border: 1px solid #eee; }
        .card img { width: 60px; margin-bottom: 10px; }
        .card h3 { margin: 10px 0; color: #333; }
        .card .category { color: #888; font-size: 14px; margin-bottom: 10px; }
        .card .price { font-size: 20px; font-weight: bold; color: var(--main-color); margin-bottom: 15px; }
        .pay-btn { background: var(--main-color); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .pay-btn:disabled { background: #ccc; }
        #loader { text-align: center; padding: 20px; color: var(--main-color); }
    </style>
</head>
<body>

<header>
    <h1>ثقة ودليل الباي 🛡️</h1>
    <p>دليلك المعتمد للتجار الموثوقين</p>
</header>

<div id="loader">جاري تحميل قائمة التجار الموثوقين...</div>
<div class="merchant-grid" id="merchantList"></div>

<script>
    Pi.init({ version: "2.0", sandbox: true });

    // وظيفة لجلب التجار من قاعدة البيانات (D1)
    async function loadMerchants() {
        try {
            // ملاحظة: لازم تكوني مجهزة ملف function اسمه get_merchants.js
            const response = await fetch('/functions/get_merchants');
            const merchants = await response.json();
            
            const list = document.getElementById('merchantList');
            document.getElementById('loader').style.display = 'none';
            
            merchants.forEach(m => {
                list.innerHTML += `
                    <div class="card">
                        <img src="${m.image_url}" alt="shop">
                        <h3>${m.name}</h3>
                        <div class="category">${m.category}</div>
                        <div class="price">${m.price_pi} Pi</div>
                        <button class="pay-btn" onclick="handlePayment('${m.name}', ${m.price_pi})">ادفع الآن</button>
                    </div>
                `;
            });
        } catch (e) {
            document.getElementById('loader').innerText = "حدث خطأ في الاتصال بقاعدة البيانات.";
        }
    }

    async function handlePayment(name, amount) {
        try {
            await Pi.createPayment({
                amount: amount,
                memo: `شراء من ${name}`,
                metadata: { merchant: name }
            }, {
                onReadyForServerApproval: (id) => fetch('/functions/approve', { method: 'POST', body: JSON.stringify({paymentId: id}) }),
                onReadyForServerCompletion: (id, txid) => fetch('/functions/complete', { method: 'POST', body: JSON.stringify({paymentId: id, txid}) }),
                onCancel: (id) => alert("تم الإلغاء"),
                onError: (err) => alert("خطأ: " + err.message)
            });
        } catch (err) {
            alert("افتح التطبيق من Pi Browser");
        }
    }

    loadMerchants();
</script>
</body>
</html>
