<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pi Payment</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>

Pi.init({ version: "2.0", sandbox: true });

function payWithPi() {

const paymentData = {
  amount: 1,
  memo: "Test payment",
  metadata: { orderId: "12345" }
};

Pi.createPayment(paymentData, {

onReadyForServerApproval: function(paymentId) {

fetch("https://pi-payment-server--thqhwdlylalbay.replit.app/approve", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ paymentId: paymentId })
});

},

onReadyForServerCompletion: function(paymentId, txid) {

fetch("https://pi-payment-server--thqhwdlylalbay.replit.app/complete", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ paymentId: paymentId, txid: txid })
});

},

onCancel: function(paymentId) {
console.log("Payment cancelled");
},

onError: function(error) {
console.log(error);
}

});

}

</script>

</head>

<body style="text-align:center;font-family:Arial;margin-top:120px;">

<h1>Pay with Pi</h1>

<button onclick="payWithPi()" style="font-size:24px;padding:20px 40px;background:#f4b400;border:none;border-radius:10px;">
Pay with Pi
</button>

</body>
</html>
