<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <title>Pi App</title>
</head>
<body style="text-align: center; font-family: sans-serif;">
    <h1>Pi Payment Test</h1>
    <button id="pay_btn" style="padding: 15px; background: #673ab7; color: #fff; border: none; border-radius: 5px;">Pay 1 Pi</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function auth() {
            try {
                const user = await Pi.authenticate(['payments', 'username'], onIncompletePaymentFound);
                console.log(user);
            } catch (err) { console.error(err); }
        }

        async function createPayment() {
            const payment = await Pi.createPayment({
                amount: 1,
                memo: "Test Payment",
                metadata: { orderId: "123" }
            }, {
                onReadyForServerApproval: (paymentId) => {
                    console.log("Payment ID:", paymentId);
                    alert("Order Submitted! ID: " + paymentId);
                    // في الفيديو: هنا كان بيتوقف ويوافق يدوياً من السيرفر
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    alert("Success! TXID: " + txid);
                },
                onCancel: (paymentId) => { console.log("Cancelled"); },
                onError: (error, payment) => { console.error(error); },
            });
        }

        document.getElementById('pay_btn').addEventListener('click', () => {
            auth().then(createPayment);
        });

        function onIncompletePaymentFound(payment) { /* ... */ }
    </script>
</body>
</html>
