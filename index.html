<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pi Payment Test</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

</head>

<body style="text-align:center;font-family:Arial">

<h2>Pi Test Payment</h2>

<button onclick="payWithPi()" style="font-size:20px;padding:10px 20px">
Pay with Pi
</button>

<script>

Pi.init({ version: "2.0", sandbox: true });

async function payWithPi() {

  try {

    await Pi.authenticate(['payments']);

    const paymentData = {
      amount: 1,
      memo: "Test payment",
      metadata: { orderId: Date.now() }
    };

    Pi.createPayment(paymentData, {

      onReadyForServerApproval: function(paymentId) {
        console.log("Ready for approval", paymentId);
      },

      onReadyForServerCompletion: function(paymentId, txid) {
        console.log("Payment complete", paymentId, txid);
        alert("Payment successful");
      },

      onCancel: function(paymentId) {
        console.log("Payment cancelled", paymentId);
      },

      onError: function(error) {
        console.error(error);
      }

    });

  } catch (err) {
    console.error(err);
  }

}

</script>

</body>
</html>
