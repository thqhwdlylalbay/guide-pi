<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - Testnet</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        h1 { color: #673ab7; font-size: 24px; }
        .status-box { margin: 20px 0; padding: 10px; border-radius: 8px; background: #fff3e0; color: #ef6c00; font-weight: bold; }
        .pay-btn { background: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .pay-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ثقة ودليل الباي</h1>
        <p>مرحلة اختبار الشبكة (Testnet)</p>
        <div id="status" class="status-box">جاري تهيئة النظام...</div>
        <button id="pay-button" class="pay-btn" disabled>دفع 0.1 Test-Pi</button>
    </div>

    <script>
        const Pi = window.Pi;
        const status = document.getElementById('status');
        const payBtn = document.getElementById('pay-button');

        // 1. وظيفة المبرمجين لمعالجة المدفوعات المعلقة (Incomplete Payments)
        const onIncompletePaymentFound = (payment) => {
            status.innerText = "وجدنا معاملة معلقة.. جاري إكمالها..";
            return fetch('/complete?id=' + payment.identifier).then(r => r.json());
        };

        // 2. تهيئة التطبيق وفحص الهوية
        Pi.init({ version: "2.0" });

        Pi.authenticate(['payments', 'username'], onIncompletePaymentFound)
          .then((auth) => {
              status.innerText = "مرحباً " + auth.user.username + " (Testnet)";
              payBtn.disabled = false;
          })
          .catch((err) => {
              status.innerText = "يرجى الفتح من Pi Browser";
              console.error(err);
          });

        // 3. وظيفة الدفع الرئيسية
        payBtn.onclick = async () => {
            payBtn.disabled = true;
            status.innerText = "جاري فتح المحفظة للتجربة...";

            try {
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Testnet Payment Testing",
                    metadata: { orderId: "test-123" }
                }, {
                    onReadyForServerApproval: (id) => fetch('/approve?id=' + id).then(r => r.json()),
                    onReadyForServerCompletion: (id) => fetch('/complete?id=' + id).then(r => r.json()),
                    onCancel: () => {
                        status.innerText = "تم إلغاء العملية";
                        payBtn.disabled = false;
                    },
                    onError: (e) => {
                        status.innerText = "خطأ: " + e.message;
                        payBtn.disabled = false;
                    }
                });
            } catch (err) {
                status.innerText = "فشلت العملية.. حاول مرة أخرى";
                payBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
