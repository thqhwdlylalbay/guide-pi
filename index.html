<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust & Pi Guide</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8f4ff; text-align: center; padding: 20px; }
        .card { background: linear-gradient(135deg, #673ab7, #2196f3); color: white; border-radius: 15px; padding: 20px; }
        .btn { background: #ffc107; border: none; padding: 15px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <h2>بوابة دفع Pi Network</h2>
        <p>مشروع ثقة ودليل الباي</p>
        <button class="btn" onclick="transferPi()">ادفع 1 Pi (تجريبي)</button>
        <p id="status"></p>
    </div>

    <script>
        // 1. تهيئة النظام - Sandbox للمراجعة
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function transferPi() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1,
                    memo: "Test Payment for Step 10",
                    metadata: { orderId: "Order_" + Date.now() },
                }, {
                    // الكود المطلوب من الكورتيم للربط مع السيرفر
                    onReadyForServerApproval: function(paymentId) {
                        return fetch('https://pi.trust-app.workers.dev/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        }).then(res => res.json());
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        return fetch('https://pi.trust-app.workers.dev/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        }).then(res => res.json());
                    },
                    onCancel: function(paymentId) { console.log("Cancelled"); },
                    onError: function(error, payment) { console.error(error); }
                });
            } catch (err) {
                document.getElementById('status').innerText = "يجب الدخول من Pi Browser";
            }
        }
    </script>
</body>
</html>
