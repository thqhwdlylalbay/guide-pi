<script>
    Pi.init({ version: "2.0", sandbox: true });
</script>

<script>
    async function handleMerchantPayment() {
        try {
            // كود مخصص لمسح أي معاملة قديمة معلقة ومنع الـ 60 ثانية
            const onIncompletePaymentFound = async (payment) => {
                console.log("Found incomplete payment, fixing...");
                await fetch('/functions/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        paymentId: payment.identifier, 
                        txid: payment.transaction ? payment.transaction.txid : null, 
                        action: 'complete' 
                    })
                });
            };

            // الدخول بحساب البي وتسوية المعاملات القديمة
            const scopes = ['payments'];
            await Pi.authenticate(scopes, onIncompletePaymentFound);

            // إنشاء طلب دفع بـ ID متغير "ديناميكي" لكسر الـ 60 ثانية
            Pi.createPayment({
                amount: 0.1,
                memo: "رسوم توثيق متجر - ثقة ودليل الباي",
                metadata: { 
                    orderId: "order_" + Date.now(), // توليد رقم فريد بالوقت الحالي
                    type: "merchant_verification" 
                },
            }, {
                onReadyForServerApproval: async (paymentId) => {
                    console.log("Payment Ready for Approval:", paymentId);
                    // إرسال الموافقة للسيرفر فوراً
                    const response = await fetch('/functions/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, action: 'approve' })
                    });
                    
                    if (!response.ok) {
                        console.error("Server failed to approve the payment");
                    }
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    console.log("Payment Ready for Completion:", txid);
                    await fetch('/functions/complete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: paymentId, txid: txid, action: 'complete' })
                    });
                    alert("تم التوثيق بنجاح!");
                    window.location.href = "whatsapp://send?phone=201220469415&text=تم_الدفع_بنجاح_رقم_" + txid;
                },
                onCancel: (id) => {
                    console.log("User cancelled payment:", id);
                },
                onError: (error, payment) => {
                    console.error("SDK Error:", error);
                    // لو حصل خطأ "معاملة معلقة"، هننبه المستخدم يفتح التطبيق تاني
                    if(error.actual_error_type === "payment_in_progress") {
                        alert("هناك معاملة معلقة، يرجى إعادة تحميل الصفحة.");
                    }
                }
            });
        } catch (e) {
            console.error(e);
            alert("يرجى التأكد من فتح التطبيق عبر متصفح Pi Browser");
        }
    }
                                                 </script>
