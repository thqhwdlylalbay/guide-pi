<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .btn { background-color: #673ab7; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <h1>مشروع ثقة ودليل الباي</h1>
    <p>اضغط أدناه لإتمام عملية الدفع المعلقة</p>
    
    <button class="btn" onclick="transferPi()">إتمام المعاملة الآن</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0" });

        async function transferPi() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1, 
                    memo: "إتمام عملية معلقة - مشروع ثقة",
                    metadata: { orderId: "123" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("إرسال للموافقة: " + paymentId);
                        // الرابط المظبوط اللي إنتي طلعتيه
                        return axios.get('https://trust-pi-guide.trust-app.workers.dev/api/payment?paymentId=' + paymentId);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        console.log("إرسال للإكمال: " + paymentId);
                        return axios.get('https://trust-pi-guide.trust-app.workers.dev/api/payment?paymentId=' + paymentId);
                    },
                    onCancel: function(paymentId) { console.log("تم إلغاء العملية"); },
                    onError: function(error, payment) { console.error("خطأ:", error); }
                });
            } catch (err) {
                console.error("عطل فني:", err);
            }
        }
    </script>
</body>
</html>
