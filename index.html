<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الدفع</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // تهيئة الـ SDK مع التأكد من وضع الـ Sandbox
        Pi.init({ version: "2.0", sandbox: true });
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #fafafa; }
        .btn { background: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; }
        #status { margin-top: 20px; color: #444; font-weight: bold; }
    </style>
</head>
<body>

    <h2>فحص بوابة الدفع (Testnet)</h2>
    <button class="btn" onclick="pay()">اضغطي هنا للدفع</button>
    <div id="status">جاهز للاختبار...</div>

    <script>
        async function pay() {
            const status = document.getElementById('status');
            status.innerHTML = "جاري محاولة الاتصال بالمحفظة... <br><small>تأكدي من ظهور نافذة المنبثقة</small>";

            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "تجربة تقنية",
                    metadata: { testId: "123" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        status.innerText = "تمت الموافقة من السيرفر. ID: " + paymentId;
                        fetch('/functions/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId, action: 'approve' })
                        });
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        status.innerText = "نجح الدفع! رقم العملية: " + txid;
                        fetch('/functions/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId, txid: txid, action: 'complete' })
                        });
                    },
                    onCancel: function(id) { status.innerText = "تم إلغاء العملية من قبلك."; },
                    onError: function(error) { status.innerText = "خطأ في المحفظة: " + error.message; }
                });
            } catch (err) {
                status.innerText = "فشل التشغيل: " + err.message;
            }
        }
    </script>
</body>
</html>
