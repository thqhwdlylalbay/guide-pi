<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
    </script>
</head>
<body>

    <button onclick="payWithScope()" style="padding: 20px; background: #673ab7; color: white; border-radius: 10px;">
        اضغطي هنا للدفع (تجربة)
    </button>

    <div id="status" style="margin-top: 20px;"></div>

    <script>
        async function payWithScope() {
            const status = document.getElementById('status');
            try {
                // الخطوة اللي كانت ناقصة: طلب إذن "payments"
                const scopes = ['payments'];
                
                // تسجيل الدخول وطلب الصلاحية أولاً
                const auth = await Pi.authenticate(scopes, (payment) => {
                    // هنا يتم التعامل مع المدفوعات غير المكتملة إن وجدت
                });

                status.innerText = "تم الحصول على الصلاحية.. جاري فتح المحفظة";

                // الآن نبدأ الدفع بعد الحصول على الـ Scope
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "تجربة دفع سكوب",
                    metadata: { test: "123" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        fetch('/functions/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId, action: 'approve' })
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("نجح الدفع! العداد اختفى.");
                    },
                    onCancel: (id) => { status.innerText = "تم الإلغاء"; },
                    onError: (err) => { status.innerText = "خطأ: " + err.message; }
                });

            } catch (err) {
                status.innerText = "خطأ في الصلاحيات: " + err.message;
            }
        }
    </script>
</body>
</html>
