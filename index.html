<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .btn { background-color: #673ab7; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; }
        .status { margin-top: 20px; color: #555; }
    </style>
</head>
<body>

    <h1>ثقة ودليل الباي</h1>
    <p>اضغط أدناه لحل مشكلة المعاملة المعلقة وتوثيق المشروع</p>
    
    <button class="btn" onclick="payPi()">ادفع 1.1 Pi لدعم وتوثيق مشروعنا</button>
    <div id="status" class="status"></div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true }); 

        async function payPi() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1.1, 
                    memo: "دعم مشروع ثقة ودليل الباي",
                    metadata: { orderId: 12345 }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // تعديل: الربط المباشر بسيرفر Vercel الجديد للموافقة
                        fetch(`https://thqhwdlylalbay-github-io-nadg.vercel.app/api/approve?paymentId=${paymentId}`);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        // تعديل: الربط المباشر بسيرفر Vercel لإتمام العملية
                        fetch(`https://thqhwdlylalbay-github-io-nadg.vercel.app/api/complete?paymentId=${paymentId}&txid=${txid}`);
                    },
                    onCancel: (paymentId) => { console.log("تم الإلغاء"); },
                    onError: (error, payment) => { console.error(error); }
                });
            } catch (err) {
                alert("حدث خطأ أو يوجد معاملة معلقة جاري حلها..");
            }
        }

        // كود معالجة المعاملات المعلقة
        Pi.authenticate(['payments', 'username'], (payment) => {
            console.log("تم تسجيل الدخول: " + payment.user.username);
        }, (incompletePayment) => {
            const paymentId = incompletePayment.identifier;
            document.getElementById('status').innerText = "تم العثور على معاملة معلقة.. جاري المعالجة...";
            
            // محاولة الموافقة على المعاملة المعلقة عبر السيرفر الجديد
            fetch(`https://thqhwdlylalbay-github-io-nadg.vercel.app/api/approve?paymentId=${paymentId}`)
                .then(() => {
                    document.getElementById('status').innerText = "تم إرسال طلب معالجة المعاملة. يرجى تحديث الصفحة.";
                });
        });
    </script>
</body>
</html>
