<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - قائمة التجار</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        h1 { color: #6d3082; }
        .merchant-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 2px solid #6d3082;
        }
        .btn-pay {
            background-color: #6d3082;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .btn-pay:hover { background-color: #562568; }
        .status-msg { margin-top: 15px; font-size: 14px; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ثقة ودليل الباي 🛡️</h1>
        <p>دليلك الموثوق للتجار في شبكة Pi</p>

        <div class="merchant-card">
            <h2>متجر الثقة الأول</h2>
            <p>الفئة: إلكترونيات</p>
            <p>السعر المطلوب: <strong style="color: #6d3082;">3.14 Pi</strong></p>
            <button class="btn-pay" onclick="startPayment('متجر الثقة الأول', 3.14)">ادفع الآن باستخدام Pi</button>
            <div id="status" class="status-msg"></div>
        </div>
    </div>

    <script>
        // 1. تهيئة الـ SDK
        // ملحوظة: sandbox: true تستخدم للتجربة، حوليها لـ false عند الإطلاق الحقيقي
        Pi.init({ version: "2.0", sandbox: true });

        async function startPayment(merchantName, piAmount) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "جاري تحضير عملية الدفع...";

            try {
                const payment = await Pi.createPayment({
                    amount: piAmount,
                    memo: "شراء من " + merchantName + " عبر دليل الثقة",
                    metadata: { merchant: merchantName }
                }, {
                    // المرحلة الأولى: موافقة السيرفر (بيكلم approve.js)
                    onReadyForServerApproval: (paymentId) => {
                        statusDiv.innerText = "في انتظار موافقة السيرفر...";
                        return fetch('/functions/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        });
                    },
                    // المرحلة الثانية: إتمام العملية وتسجيلها (بيكلم complete.js)
                    onReadyForServerCompletion: (paymentId, txid) => {
                        statusDiv.innerText = "جاري تسجيل العملية في قاعدة البيانات...";
                        return fetch('/functions/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        });
                    },
                    onCancel: (paymentId) => {
                        statusDiv.innerText = "تم إلغاء عملية الدفع.";
                        statusDiv.style.color = "orange";
                    },
                    onError: (error, payment) => {
                        statusDiv.innerText = "حدث خطأ: " + error.message;
                        statusDiv.style.color = "red";
                    }
                });

                if (payment) {
                    statusDiv.innerText = "تمت عملية الدفع بنجاح! شكراً لثقتك.";
                    statusDiv.style.color = "green";
                }
            } catch (err) {
                statusDiv.innerText = "تأكد من فتح الموقع من داخل Pi Browser.";
                statusDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
