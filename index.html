<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثقة ودليل الباي - التحقق من المعاملات</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // التهيئة الرسمية للإصدار 2.0
        // ملاحظة: sandbox: true ضروري طالما أنكِ في مرحلة الاختبار
        Pi.init({ version: "2.0", sandbox: true });
    </script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding-top: 50px;">

    <div style="background: white; max-width: 450px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h1 style="color: #673ab7;">ثقة ودليل الباي</h1>
        <hr>
        <p id="status-text" style="color: #444; font-weight: bold;">جاري فحص حالة الحساب...</p>
        
        <button id="pay-button" style="padding: 15px 35px; background-color: #673ab7; color: white; border: none; border-radius: 50px; font-size: 20px; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s;">
            إتمام المعاملة (الخطوة 10)
        </button>
        
        <div id="info-box" style="margin-top: 20px; font-size: 13px; color: #666; text-align: right; background: #eee; padding: 10px; border-radius: 10px;">
            * هذا التطبيق يعمل في بيئة الاختبار (Sandbox).
        </div>
    </div>

    <script>
        // تعريف الصلاحيات المطلوبة
        const scopes = ['username', 'payments'];

        /**
         * دالة معالجة المدفوعات غير المكتملة
         * يتم استدعاؤها إذا وجد النظام معاملة قديمة لم يتم إغلاقها بـ /complete
         */
        const onIncompletePaymentFound = (payment) => {
            console.warn("Incomplete payment found!", payment);
            document.getElementById('status-text').innerText = "تم اكتشاف معاملة معلقة، جاري معالجتها...";
            
            // بناءً على التعليمات، يجب إغلاق المعاملة لإتاحة دفع جديد
            // سنحاول إكمالها برمجياً إذا وجد txid، وإلا سننتظر تدخل النظام
            if (payment.transaction && payment.transaction.txid) {
                Pi.completePayment(payment.identifier, payment.transaction.txid);
                document.getElementById('status-text').innerText = "تم إغلاق المعاملة القديمة بنجاح.";
            } else {
                // إذا لم يتم الدفع فعلياً، نقوم بإلغائها لفتح السكة
                // ملحوظة: إلغاء المعاملة متاح عبر الـ SDK في حالات معينة
                console.log("العملية لم تصل للبلوكشين بعد، يرجى المحاولة مرة أخرى.");
            }
        };

        // 1. بدء عملية المصادقة فور فتح التطبيق
        Pi.authenticate(scopes, onIncompletePaymentFound).then(function(auth) {
            document.getElementById('status-text').innerText = "مرحباً: " + auth.user.username;
            console.log("Auth Success", auth);
        }).catch(function(error) {
            console.error(error);
            document.getElementById('status-text').innerText = "خطأ في المصادقة، تأكدي من فتح الموقع من Pi Browser.";
        });

        // 2. إنشاء الدفع عند الضغط على الزرار
        document.getElementById('pay-button').onclick = function() {
            const paymentData = {
                amount: 1, // الكمية
                memo: "اختبار الخطوة 10 - مشروع ثقة ودليل الباي", // المذكرات
                metadata: { orderId: "step_10_" + Date.now() }, // بيانات إضافية
            };

            const callbacks = {
                onReadyForServerApproval: (paymentId) => {
                    // هنا يجب إرسال paymentId للسيرفر للموافقة
                    // في وضع Sandbox وللخطوة 10، المنصة تعالج هذا الجزء أحياناً تلقائياً
                    console.log("Payment ID obtained:", paymentId);
                    document.getElementById('status-text').innerText = "المعاملة قيد الموافقة...";
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    // عند نجاح الدفع في البلوكشين، يجب إرسال txid للسيرفر
                    console.log("Transaction ID (txid):", txid);
                    Pi.completePayment(paymentId, txid); // إغلاق المعاملة برمجياً
                    document.getElementById('status-text').innerText = "مبروك! تمت المعاملة بنجاح.";
                    alert("تمت المعاملة بنجاح، يمكنك الآن العودة للوحة المطورين.");
                },
                onCancel: (paymentId) => {
                    console.log("Payment cancelled", paymentId);
                    document.getElementById('status-text').innerText = "تم إلغاء المعاملة.";
                },
                onError: (error, payment) => {
                    console.error("Payment Error", error);
                    document.getElementById('status-text').innerText = "حدث خطأ أثناء المعاملة.";
                },
            };

            Pi.createPayment(paymentData, callbacks);
        };
    </script>
</body>
</html>
